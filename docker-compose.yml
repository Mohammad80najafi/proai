name: proai-local

services:
  mongodb:
    image: mongo:8.0
    container_name: proai-mongodb
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          mongosh --host localhost:27017 --quiet --eval
          "try { rs.status().ok } catch (error) {
          rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok }"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  mongodb_data:
    name: proai-mongodb-data
